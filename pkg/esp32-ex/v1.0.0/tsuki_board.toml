# ── Board identity ─────────────────────────────────────────────────────────────
[board]
id          = "esp32-ex"
name        = "ESP32 Dev Module (ex)"
version     = "1.0.0"
description = "ESP32 optimizado: 80 MHz por defecto, WiFi bajo demanda, sin BT, -Os, subida a 2 Mbaud"
author      = "tsuki-ex"
fqbn        = "esp32:esp32:esp32"
variant     = "esp32"
flash_kb    = 4096
ram_kb      = 520

# ── Companion files ────────────────────────────────────────────────────────────
[files]
sandbox = "sandbox.json"
ports   = "ports.json"
readme  = "README.md"

# ── Toolchain ──────────────────────────────────────────────────────────────────
[toolchain]
type        = "esp32"
variant     = "esp32"
upload_tool = "esptool"
upload_baud = 2000000
f_cpu       = 80000000

# ── USB auto-detection ─────────────────────────────────────────────────────────
[detection]
name_patterns = ["ESP32", "ESP-WROOM", "CP2102", "CH340"]

[[detection.usb]]
vid  = "10C4"
pid  = "EA60"
chip = "Silicon Labs CP2102"

[[detection.usb]]
vid  = "1A86"
pid  = "7523"
chip = "CH340"

[[detection.usb]]
vid  = "0403"
pid  = "6001"
chip = "FTDI FT232"

[[detection.usb]]
vid  = "0403"
pid  = "6015"
chip = "FTDI FT231X"

# ── Platform group (used by IDE to group boards + know how to install) ─────────
[platform]
id           = "esp32-ex"
display_name = "Espressif ESP32 (tsuki-ex)"
icon         = "wifi"
core_package = "esp32:esp32"
size_mb      = 274

# ── Compiler defines ───────────────────────────────────────────────────────────
[defines]
values = [
  "ARDUINO_ESP32_DEV",
  "ARDUINO_ARCH_ESP32",
  "ESP32",
  "TSUKI_EX=1",
  "CONFIG_BT_ENABLED=0",
  "CONFIG_PM_ENABLE=1",
  "CONFIG_FREERTOS_HZ=100",
  "CONFIG_ESP32_DEFAULT_CPU_FREQ_80=1",
]
