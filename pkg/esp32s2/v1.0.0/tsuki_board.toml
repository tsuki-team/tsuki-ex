# ── Board identity ─────────────────────────────────────────────────────────────
[board]
id          = "esp32s2"
name        = "ESP32-S2 Dev Module (ex)"
version     = "1.0.0"
description = "ESP32-S2 optimizado: LP core habilitado, 80 MHz, sin BT nativo, -Os"
author      = "tsuki-ex"
fqbn        = "esp32:esp32:esp32s2"
variant     = "esp32s2"
flash_kb    = 4096
ram_kb      = 320

[files]
sandbox = "sandbox.json"
ports   = "ports.json"
readme  = "README.md"

# ── Toolchain ──────────────────────────────────────────────────────────────────
[toolchain]
type        = "esp32"
variant     = "esp32s2"
upload_tool = "esptool"
upload_baud = 2000000
f_cpu       = 80000000

# ── USB auto-detection ─────────────────────────────────────────────────────────
[detection]
name_patterns = ["ESP32-S2", "CP2102", "CH340"]

[[detection.usb]]
vid  = "303A"
pid  = "0002"
chip = "ESP32-S2 native USB"

[[detection.usb]]
vid  = "10C4"
pid  = "EA60"
chip = "Silicon Labs CP2102"

[[detection.usb]]
vid  = "1A86"
pid  = "7523"
chip = "CH340"

# ── Platform group ─────────────────────────────────────────────────────────────
[platform]
id           = "esp32"
display_name = "Espressif ESP32 (tsuki-ex)"
icon         = "wifi"
core_package = "esp32:esp32"
size_mb      = 274

# ── Compiler defines ───────────────────────────────────────────────────────────
[defines]
values = [
  "ARDUINO_ESP32S2_DEV",
  "ARDUINO_ARCH_ESP32",
  "CONFIG_IDF_TARGET_ESP32S2",
  "TSUKI_EX=1",
  "CONFIG_PM_ENABLE=1",
  "CONFIG_ESP32S2_DEFAULT_CPU_FREQ_80=1",
  "CONFIG_ULP_COPROC_ENABLED=1",
]
